name: CI gRPC

# Trigger on push and pull requests affecting gRPC feature branches
on:
  push:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'grpc/**'
  
  pull_request:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'grpc/**'

env:
  MIN_COVERAGE: 0.0

jobs:
  code_lint-format-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpc
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          cache: true
          cache-dependency-path: grpc/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Check code formatting (gofmt)
        run: |
          UNFORMATTED=$(gofmt -l ./server ./client)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi
          
  code_build-and-test:
    needs: code_lint-format-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpc
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          cache: true
          cache-dependency-path: grpc/go.sum
    
      - name: Download dependencies
        run: go mod tidy
      
      - name: Compile gRPC server
        run: go build -o bin/server ./server

      - name: Run tests with coverage
        run: |
          go test -coverprofile=coverage.out ./...

          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: $COVERAGE%"
          
          PASS=$(echo "$COVERAGE >= $MIN_COVERAGE" | bc)
          if [ "$PASS" -ne 1 ]; then
            echo "Coverage $COVERAGE% < $MIN_COVERAGE% ✘"
            exit 1
          else
            echo "Coverage $COVERAGE% >= $MIN_COVERAGE% ✔"
          fi
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grpc-coverage-report
          path: grpc/coverage.out