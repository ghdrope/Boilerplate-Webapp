name: CI gRPC

# Trigger on push and pull requests affecting gRPC feature branches
on:
  push:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'grpc/**'
  
  pull_request:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'grpc/**'

jobs:
  code_build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpc
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23
          cache: true
    
      - name: Download dependencies
        run: go mod tidy
      
      - name: Compile gRPC server
        run: go build -v ./...
      
      - name: Run tests (placeholder)
        run: go test ./...