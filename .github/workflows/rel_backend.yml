name: Rel Backend

# Trigger only on push to `release-*.*.*` branches (release workflow)
on:
  push:
    branches:
      - 'release-*.*.*'

jobs:
  call-prod:
    # Calls a production-specific reusable workflow
    uses: ./.github/workflows/template_rel.yml
    with:
      context: .
      dockerfile: docker/backend.dockerfile
      image_name: backend
