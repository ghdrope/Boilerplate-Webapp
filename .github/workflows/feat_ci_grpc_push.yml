name: Feat CI gRPC Push

on:
  push:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'grpc/**'

env:
  MIN_COVERAGE: 75.0

jobs:
  lint-format-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          cache: true
          cache-dependency-path: grpc/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin

      - name: Run Linter
        run: make lint

      - name: Check Formatting
        run: make format-check
          
  build-and-unit-tests:
    needs: lint-format-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpc
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          cache: true
          cache-dependency-path: grpc/go.sum
    
      - name: Download dependencies
        run: go mod tidy
      
      - name: Build gRPC Server
        run: make build-server

      - name: Run unit tests with coverage threshold
        run: |
          go test -coverprofile=coverage.out ./internal/...
          coverage=$(go tool cover -func=coverage.out | grep total: | awk '{print substr($3, 1, length($3)-1)}')
          minimum=${{ env.MIN_COVERAGE }}
          result=$(echo "$coverage >= $minimum" | bc)
          if [ "$result" -eq 1 ]; then
            echo "Unit test coverage $coverage% >= $minimum% ✔"
          else
            echo "Unit test coverage $coverage% < $minimum% ✘"
            exit 1
          fi
      
      - name: Upload coverage report
        if: always() && hashFiles('grpc/coverage.out') != ''
        uses: actions/upload-artifact@v4
        with:
          name: grpc-coverage-report
          path: grpc/coverage.out