name: Dev Backend

# Trigger only on push to development branch (development workflow)
on:
  push:
    branches:
      - development
    paths:
      - 'backend/**'
      - 'docker/backend.dockerfile'

jobs:
  call-prod:
    # Calls a production-specific reusable workflow
    uses: ./.github/workflows/template_dev.yml
    with:
      context: .
      dockerfile: docker/backend.dockerfile
      image_name: backend
