name: CI Backend

# Trigger on push and pull requests affecting backend feature branches
on:
  push:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'backend/**'
  
  pull_request:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'backend/**'

jobs:
  code_lint-format-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Detekt lint
        run: ./gradlew detekt

      - name: Check Spotless formatting
        run: ./gradlew spotlessCheck

  code_build-and-test:
    needs: code_lint-format-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Clean and build project
        run: ./gradlew clean bootJar --no-daemon

      - name: Run tests with coverage threshold
        run: ./gradlew jacocoTestCoverageVerification test jacocoTestReport --no-daemon

      #- name: Upload Jacoco coverage report
      #  if: always()
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: backend-coverage-report
      #    path: backend/build/reports/jacoco/test