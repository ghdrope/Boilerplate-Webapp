name: Versioned

# Trigger on version tags (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  image_build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        component: [backend, frontend, grpc]  # Run for each component

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: image=moby/buildkit:latest
          buildkit-flags: --allow-insecure-entitlement network.host

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=ref,event=tag
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: int128/kaniko-action@v1
        with:
          context: .
          file: docker/${{ matrix.component }}.dockerfile
          push: true
          platforms: linux/amd64, linux/arm64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max