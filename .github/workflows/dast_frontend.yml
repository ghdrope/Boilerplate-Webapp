name: DAST Frontend

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'
  pull_request:
    branches:
      - development
    paths:
      - 'frontend/**'
      - 'docker/frontend.dockerfile'
  push:
    branches:
      - development
      - main
      - 'release-*.*.*'
    paths:
      - 'frontend/**'
      - 'docker/frontend.dockerfile'

jobs:
  dast-owasp-zap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f docker/frontend.dockerfile -t frontend:test .

      - name: Run frontend container
        run: docker run -d --rm --name frontend -p 4173:8080 frontend:test

      - name: Wait for frontend service
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:4173 > /dev/null; then
              echo "Frontend is up!"
              break
            fi
            echo "Waiting for frontend..."
            sleep 3
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:4173'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          token: ${{ secrets.GITHUB_TOKEN }}
