name: CI Frontend

# Trigger on push and pull requests affecting frontend feature branches
on:
  push:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'frontend/**'
  
  pull_request:
    branches-ignore:
      - main
      - 'release-*.*.*'
      - development
    paths:
      - 'frontend/**'

jobs:
  code_lint-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Yarn install
        run: yarn install --frozen-lockfile
      
      - name: Lint JS/TS (ESLint)
        run: yarn lint
      
      - name: Type checking (tsc)
        run: yarn type-check

      - name: Check Prettier formatting
        run: yarn format:check

      - name: Lint CSS (Stylelint)
        run: yarn lint:css
  
  code_build-and-test:
    needs: code_lint-typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Yarn install
        run: yarn install --frozen-lockfile
      
      - name: Build project (Vite)
        run: yarn build
      
      - name: Run Jest tests
        run: yarn test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage