frontend:
  image:
    repository: ghcr.io/ghdrope/boilerplate-webapp-frontend
    tag: latest

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    hosts:
      - host: frontend.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-tls
        hosts:
          - frontend.example.com
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  
  extraEnvs:
    - name: VITE_API_URL
      value: "http://backend:8000"

backend:
  image:
    repository: ghcr.io/ghdrope/boilerplate-webapp-backend
    tag: latest

  replicaCount: 1   

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
    
  readinessPath: /hello

grpc:
  image:
    repository: ghcr.io/ghdrope/boilerplate-webapp-grpc
    tag: latest

  replicaCount: 1   
  service:
    type: ClusterIP
    port: 50051

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi