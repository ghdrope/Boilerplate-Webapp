syntax = "proto3";

package hello;

// Specifies the Go package for the generated code.
option go_package = "github.com/ghdrope/boilerplate-webapp/grpc/gen/proto";

// HelloService defines the gRPC service that provides greeting functionality.
service HelloService {
    // SayHello returns a greeting message containing the provided name.
    rpc SayHello (HelloRequest) returns (HelloResponse);
}

// HelloRequest contains the name to be included in the greeting message.
message HelloRequest {
    string name = 1;
}

// HelloResponse contains the greeting message returned by the service.
message HelloResponse {
    string message = 1;
}
