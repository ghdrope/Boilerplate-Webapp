# Number of worker processes (typically matches the number of CPU cores)
worker_processes 1;

events {
  # Max number of simultaneous connections per worker
  worker_connections 1024;
}

http {
  # Load MIME types
  include       mime.types;
  default_type  application/octet-stream;

  # File transfer optimization
  sendfile        on;
  keepalive_timeout  65;

  server {
    listen 8080;
    server_name localhost;

    # ================================
    # SPA Frontend: Serve React build
    # ================================
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files with cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 30d;
      access_log off;
      add_header Cache-Control "public";
      add_header X-Content-Type-Options nosniff;
      add_header X-Frame-Options DENY;
      add_header X-XSS-Protection "1; mode=block";
      add_header Referrer-Policy "no-referrer-when-downgrade";
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=()";
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    }

    # Do not cache main HTML to ensure updates are loaded
    location = /index.html {
      add_header Cache-Control "no-store, must-revalidate";
      add_header X-Content-Type-Options nosniff;
      add_header X-Frame-Options DENY;
      add_header X-XSS-Protection "1; mode=block";
      add_header Referrer-Policy "no-referrer-when-downgrade";
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=()";
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Disable access to hidden files like .git
    location ~ /\. {
      deny all;
    }

    # ===============================
    # API Proxy to Backend Container
    # ===============================
    #location /api/ {
    #  proxy_pass http://backend:8080/api/;
    #  proxy_http_version 1.1;
    #
    #  # Forward headers to backend
    #  proxy_set_header Host $host;
    #  proxy_set_header X-Real-IP $remote_addr;
    #  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #  proxy_set_header X-Forwarded-Proto $scheme;
    #}
  }
}
