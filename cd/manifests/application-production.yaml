apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: boilerplate-webapp-prod
    namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ghdrope/boilerplate-webapp.git
    targetRevision: main
    path: charts/
    helm:
      valueFiles:
        - values.yaml
        - values.production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: boilerplate-webapp-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true