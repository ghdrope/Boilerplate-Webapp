apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: boilerplate-webapp-dev
    namespace: argocd
spec:
    project: default
    source:
        repoURL: https://github.com/ghdrope/boilerplate-webapp.git
        targetRevision: development
        path: charts/
        helm:
            valueFiles:
                - values.yaml
                - values.development.yaml
    destination:
        server: https://kubernetes.default.svc
        namespace: boilerplate-webapp-dev
    syncPolicy:
        automated:
            prune: true
            selfHeal: true